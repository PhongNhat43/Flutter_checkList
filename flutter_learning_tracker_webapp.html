<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flutter Learning Academy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
    }

    .subtitle {
      color: #94a3b8;
      margin-top: 8px;
    }

    .stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .stat-card {
      flex: 1;
      min-width: 220px;
      background: #1e293b;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid #334155;
    }

    .stat-title {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
    }

    .progress-wrapper {
      width: 100%;
      height: 12px;
      background: #334155;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 16px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
      transition: width 0.3s ease;
    }

    .phase {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .phase-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .phase-title {
      font-size: 22px;
      font-weight: 700;
    }

    .phase-progress {
      color: #38bdf8;
      font-weight: 600;
    }

    .task-group {
      margin-bottom: 24px;
    }

    .task-group-title {
      font-size: 18px;
      margin-bottom: 14px;
      color: #cbd5e1;
    }

    .task {
      justify-content: space-between;
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      background: #0f172a;
      transition: 0.2s ease;
    }

    .task:hover {
      background: #111c33;
    }

    .task input {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .task label {
      flex: 1;
      cursor: pointer;
      line-height: 1.5;
    }

    .task-actions {
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }

    .task-detail-btn {
      border: 1px solid #334155;
      background: transparent;
      color: #93c5fd;
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .task-detail-btn:hover {
      background:#1e293b;
      border-color:#60a5fa;
    }

    .detail-panel {
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      margin-top: 10px;
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      display: none;
      color: #cbd5e1;
      line-height: 1.7;
      font-size: 14px;
    }

    .detail-panel.show {
      display: block;
    }

    .detail-content {
      white-space: pre-line;
      line-height: 1.9;
      color: #dbeafe;
      margin-top: 12px;
    }

    .note-box {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #334155;
    }

    .note-box textarea {
      min-height: 90px;
      font-size: 13px;
      background:#020617;
    }

    .note-label {
      font-size:13px;
      margin-bottom:10px;
      color:#93c5fd;
      font-weight:600;
    }

    .detail-title {
      color: #93c5fd;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .task.completed label {
      text-decoration: line-through;
      color: #64748b;
    }

    .notes {
      margin-top: 32px;
      background: #1e293b;
      border-radius: 20px;
      padding: 24px;
      border: 1px solid #334155;
    }

    .notes h2 {
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      color: white;
      resize: vertical;
      font-size: 14px;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }

    .reset-btn {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: #ef4444;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .reset-btn:hover {
      opacity: 0.9;
    }

    /* Detail tabs */
    .detail-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid #334155;
    }

    .detail-tab-btn {
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: 0.2s ease;
    }

    .detail-tab-btn.active {
      color: #38bdf8;
      border-bottom-color: #38bdf8;
    }

    .detail-tab-btn:hover {
      color: #cbd5e1;
    }

    .detail-tab-content {
      display: none;
    }

    .detail-tab-content.active {
      display: block;
    }

    /* Learning Objectives */
    .objectives-list {
      list-style: none;
      margin: 12px 0;
    }

    .objectives-list li {
      padding: 8px 0;
      padding-left: 24px;
      position: relative;
      color: #dbeafe;
    }

    .objectives-list li:before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #38bdf8;
      font-weight: 700;
    }

    /* Code Example */
    .code-example {
      background: #020617;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
      margin: 12px 0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      overflow-x: auto;
      color: #dbeafe;
      line-height: 1.6;
    }

    /* Tips */
    .tips-list {
      list-style: none;
      margin: 12px 0;
    }

    .tips-list li {
      padding: 10px;
      margin-bottom: 8px;
      background: #1e293b;
      border-left: 3px solid #f59e0b;
      border-radius: 4px;
      color: #dbeafe;
    }

    .tips-list li strong {
      color: #fbbf24;
    }

    .gotchas-list li {
      border-left-color: #ef4444;
    }

    .gotchas-list li strong {
      color: #fca5a5;
    }

    /* Quiz Modal */
    .quiz-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .quiz-modal.show {
      display: flex;
    }

    .quiz-modal-content {
      background: #1e293b;
      border-radius: 16px;
      padding: 32px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid #334155;
    }

    .quiz-close {
      float: right;
      font-size: 28px;
      font-weight: bold;
      color: #94a3b8;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .quiz-close:hover {
      color: #f8fafc;
    }

    .quiz-title {
      font-size: 20px;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 24px;
      clear: both;
    }

    .quiz-question {
      margin-bottom: 24px;
    }

    .quiz-question-text {
      font-size: 14px;
      font-weight: 600;
      color: #dbeafe;
      margin-bottom: 12px;
    }

    .quiz-options {
      list-style: none;
    }

    .quiz-option {
      padding: 10px 14px;
      margin-bottom: 8px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .quiz-option:hover {
      background: #111c33;
      border-color: #60a5fa;
    }

    .quiz-option input {
      margin-right: 8px;
    }

    .quiz-result {
      margin-top: 24px;
      padding: 16px;
      background: #0f172a;
      border-radius: 8px;
      text-align: center;
      display: none;
    }

    .quiz-result.show {
      display: block;
    }

    .quiz-result-text {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .quiz-result-correct {
      color: #10b981;
    }

    .quiz-result-incorrect {
      color: #ef4444;
    }

    .quiz-btn {
      padding: 10px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 16px;
      width: 100%;
      transition: 0.2s ease;
    }

    .quiz-btn:hover {
      background: #2563eb;
    }

    @media (max-width: 768px) {
      .title {
        font-size: 26px;
      }

      .phase-title {
        font-size: 18px;
      }

      .stat-value {
        font-size: 24px;
      }

      .quiz-modal-content {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 class="title">🚀 Flutter Learning Academy</h1>
        <p class="subtitle">
          Một cuốn giáo trình học Flutter tương tác dành cho iOS Developer và người mới bắt đầu
        </p>
      </div>

      <button class="reset-btn" onclick="resetProgress()">
        Reset Progress
      </button>
                    </div>
                  </div>

                  <div class="stats">
      <div class="stat-card">
        <div class="stat-title">Tổng tiến độ</div>
        <div class="stat-value" id="progressPercent">0%</div>

        <div class="progress-wrapper">
          <div class="progress-bar" id="mainProgressBar"></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-title">Tasks hoàn thành</div>
        <div class="stat-value">
          <span id="completedTasks">0</span>/<span id="totalTasks">0</span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-title">Mục tiêu</div>
        <div class="stat-value">30 Days</div>
      </div>
    </div>

    <div id="roadmap"></div>

    <div class="notes">
      <h2>📝 Learning Notes</h2>
      <textarea
        id="learningNotes"
        placeholder="Ghi chú bug, insight, AI prompt, kiến thức học được..."
      ></textarea>
    </div>

    <div class="footer">
      Built with HTML + CSS + JavaScript + localStorage
    </div>
  </div>

  <!-- Quiz Modal -->
  <div class="quiz-modal" id="quizModal">
    <div class="quiz-modal-content">
      <button class="quiz-close" onclick="closeQuiz()">×</button>
      <div class="quiz-title" id="quizTitle">📝 Quick Quiz</div>
      <div id="quizContent"></div>
      <div class="quiz-result" id="quizResult">
        <div class="quiz-result-text" id="resultText"></div>
        <button class="quiz-btn" onclick="retakeQuiz()" style="margin-top: 8px;">Làm lại</button>
      </div>
      <button class="quiz-btn" onclick="submitQuiz()" id="submitBtn">Nộp bài</button>
    </div>
  </div>

  <script>
    // Enhanced lesson data with objectives, code, tips, and quiz
    const lessonEnhanced = {
      'Variable và data type': {
        objectives: [
          'Hiểu các kiểu dữ liệu cơ bản (int, double, String, bool)',
          'Biết cách khai báo variable',
          'Hiểu Type inference trong Dart',
          'Làm quen với List và Map'
        ],
        codeExample: `void main() {
  // Variables
  int age = 25;
  double price = 19.99;
  String name = "Flutter";
  bool isActive = true;

  // Type inference
  var email = "user@example.com"; // Dart infers String

  // Collections
  List<int> numbers = [1, 2, 3];
  Map<String, int> scores = {"math": 95};

  print('Name: \$name, Age: \$age');
}`,
        tips: [
          '<strong>Tip:</strong> Dùng <code>var</code> để Dart tự suy luận kiểu',
          '<strong>Tip:</strong> Dùng <code>final</code> cho variable không thay đổi',
          '<strong>Tip:</strong> Dùng <code>const</code> cho hằng số compile-time'
        ],
        gotchas: [
          '<strong>Gotcha:</strong> <code>var</code> khác <code>dynamic</code>. Var suy luận 1 lần, dynamic thì không',
          '<strong>Gotcha:</strong> String interpolation dùng <code>\$variable</code>, không phải <code>${variable}</code>',
          '<strong>Gotcha:</strong> <code>null</code> là giá trị hợp lệ, nhưng Dart 2.12+ có null safety bắt buộc'
        ],
        quiz: [
          {
            question: 'Kiểu dữ liệu nào dùng cho số có phần thập phân?',
            options: ['int', 'double', 'Float', 'Number'],
            correct: 1
          },
          {
            question: 'Cách nào để khai báo variable không thay đổi?',
            options: ['var x = 5;', 'final x = 5;', 'const x = 5;', 'Cả final và const'],
            correct: 3
          },
          {
            question: 'Kết quả của \`var x = "5";\` là kiểu gì?',
            options: ['int', 'String', 'double', 'dynamic'],
            correct: 1
          }
        ]
      },

      'Function cơ bản': {
        objectives: [
          'Viết function cơ bản với return value',
          'Sử dụng parameter và argument',
          'Hiểu arrow function',
          'Viết function với optional parameter'
        ],
        codeExample: `// Basic function
int add(int a, int b) {
  return a + b;
}

// Arrow function
int multiply(int a, int b) => a * b;

// Optional parameter
String greet(String name, [String emoji = '👋']) {
  return '\$emoji Hello, \$name!';
}

// Named parameter
void setUser({
  required String name,
  int age = 0,
}) {
  print('User: \$name, Age: \$age');
}

void main() {
  print(add(5, 3));           // 8
  print(multiply(4, 2));      // 8
  print(greet("Dart"));       // 👋 Hello, Dart!
  setUser(name: "Alex", age: 25);
}`,
        tips: [
          '<strong>Tip:</strong> Dùng arrow function <code>=></code> cho function ngắn 1 dòng',
          '<strong>Tip:</strong> Dùng named parameter để code rõ ràng hơn',
          '<strong>Tip:</strong> Optional parameter để function linh hoạt'
        ],
        gotchas: [
          '<strong>Gotcha:</strong> <code>required</code> keyword là bắt buộc từ Dart 2.12+',
          '<strong>Gotcha:</strong> Optional positional parameter dùng <code>[param]</code>, named dùng <code>{param}</code>',
          '<strong>Gotcha:</strong> Function không return gì thì default return <code>null</code>'
        ],
        quiz: [
          {
            question: 'Cách viết arrow function cho function trả về 2 số nhân nhau?',
            options: [
              'int multiply(a, b) { return a * b; }',
              'int multiply(a, b) => a * b;',
              'multiply(a, b) => a * b;',
              'Cả B và C'
            ],
            correct: 1
          },
          {
            question: 'Keyword nào bắt buộc tham số trong named parameter?',
            options: ['optional', 'required', 'final', 'const'],
            correct: 1
          }
        ]
      },

      'Class và constructor': {
        objectives: [
          'Tạo class và object',
          'Viết constructor',
          'Sử dụng property và method',
          'Hiểu this keyword'
        ],
        codeExample: `class User {
  String name;
  int age;
  String email;

  // Constructor
  User(this.name, this.age, this.email);

  // Method
  void displayInfo() {
    print('Name: \$name, Age: \$age, Email: \$email');
  }

  String getIntro() => 'Hi, I am \$name';
}

class Movie {
  String title;
  int year;
  double rating;

  Movie({
    required this.title,
    required this.year,
    this.rating = 0.0,
  });

  bool isHighRated() => rating >= 8.0;
}

void main() {
  var user = User('Alice', 25, 'alice@example.com');
  user.displayInfo();

  var movie = Movie(title: 'Avatar', year: 2009, rating: 8.0);
  print(movie.getIntro()); // Need to add getIntro() method
}`,
        tips: [
          '<strong>Tip:</strong> Dùng positional parameter cho essential properties',
          '<strong>Tip:</strong> Dùng named parameter khi có nhiều property optional',
          '<strong>Tip:</strong> <code>this.property</code> shorthand tiết kiệm code'
        ],
        gotchas: [
          '<strong>Gotcha:</strong> Property phải khai báo type, không dùng <code>var</code>',
          '<strong>Gotcha:</strong> Constructor tên phải giống class name',
          '<strong>Gotcha:</strong> Dart không support overloading constructor (phải dùng named constructor)'
        ],
        quiz: [
          {
            question: 'Cách khai báo constructor tắt trong Dart?',
            options: [
              'User(String name, int age) { this.name = name; }',
              'User(this.name, this.age);',
              'User.constructor(this.name, this.age);',
              'Cả A và B'
            ],
            correct: 1
          },
          {
            question: 'Làm sao để tạo object với named parameter?',
            options: [
              'User("Alice", 25)',
              'User(name: "Alice", age: 25)',
              'new User("Alice", 25)',
              'User {...}'
            ],
            correct: 1
          }
        ]
      },

      'StatelessWidget': {
        objectives: [
          'Tạo StatelessWidget',
          'Viết build method',
          'Sử dụng layout widget',
          'Tạo reusable component'
        ],
        codeExample: `import 'package:flutter/material.dart';

class MyCard extends StatelessWidget {
  final String title;
  final String description;

  const MyCard({
    required this.title,
    required this.description,
  });

  @override
  Widget build(BuildContext context) {
    return Card(
      margin: EdgeInsets.all(16),
      child: Padding(
        padding: EdgeInsets.all(16),
        child: Column(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            Text(
              title,
              style: Theme.of(context).textTheme.headlineSmall,
            ),
            SizedBox(height: 8),
            Text(description),
          ],
        ),
      ),
    );
  }
}

class HomePage extends StatelessWidget {
  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(title: Text('Home')),
      body: ListView(
        children: [
          MyCard(
            title: 'Card 1',
            description: 'This is reusable card',
          ),
        ],
      ),
    );
  }
}`,
        tips: [
          '<strong>Tip:</strong> StatelessWidget cho UI cố định (không thay đổi)',
          '<strong>Tip:</strong> Dùng <code>const constructor</code> để Flutter optimize rebuild',
          '<strong>Tip:</strong> Luôn khai báo property là <code>final</code>'
        ],
        gotchas: [
          '<strong>Gotcha:</strong> StatelessWidget không có setState, UI không update khi data thay đổi',
          '<strong>Gotcha:</strong> Mỗi lần parent rebuild, StatelessWidget cũng rebuild',
          '<strong>Gotcha:</strong> Không thể thay đổi property của StatelessWidget sau tạo'
        ],
        quiz: [
          {
            question: 'StatelessWidget dùng cho UI nào?',
            options: [
              'UI thay đổi theo state',
              'UI cố định sau khi tạo',
              'UI có animation',
              'UI interactive'
            ],
            correct: 1
          },
          {
            question: 'Method nào là entry point để render UI?',
            options: ['render()', 'init()', 'build()', 'display()'],
            correct: 2
          }
        ]
      },

      'StatefulWidget': {
        objectives: [
          'Tạo StatefulWidget và State class',
          'Sử dụng setState',
          'Quản lý state trong widget',
          'Hiểu lifecycle'
        ],
        codeExample: `import 'package:flutter/material.dart';

class Counter extends StatefulWidget {
  @override
  _CounterState createState() => _CounterState();
}

class _CounterState extends State<Counter> {
  int _count = 0;

  void _increment() {
    setState(() {
      _count++;
    });
  }

  void _decrement() {
    setState(() {
      _count--;
    });
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(title: Text('Counter')),
      body: Center(
        child: Column(
          mainAxisAlignment: MainAxisAlignment.center,
          children: [
            Text(
              'Count: \$_count',
              style: TextStyle(fontSize: 24),
            ),
            SizedBox(height: 20),
            Row(
              mainAxisAlignment: MainAxisAlignment.center,
              children: [
                ElevatedButton(
                  onPressed: _decrement,
                  child: Text('-'),
                ),
                SizedBox(width: 10),
                ElevatedButton(
                  onPressed: _increment,
                  child: Text('+'),
                ),
              ],
            ),
          ],
        ),
      ),
    );
  }
}`,
        tips: [
          '<strong>Tip:</strong> Luôn dùng StatefulWidget khi có state thay đổi',
          '<strong>Tip:</strong> Gọi setState() trong callback khi dữ liệu thay đổi',
          '<strong>Tip:</strong> Property state phải có prefix <code>_</code> (private)'
        ],

                      <!-- Quiz Tab -->
                      <div class="detail-tab-content" data-tab="quiz">
                        <div class="detail-title">📝 Quick Quiz</div>
                        <p style="color: #cbd5e1; margin-bottom: 12px;">Kiểm tra hiểu biết của bạn với ${lessonEnhanced[subtask].quiz.length} câu hỏi</p>
                        <button class="quiz-btn" onclick="startQuiz('${subtask}')" style="width: 100%;">Bắt đầu Quiz</button>
                      </div>
                    ` : ''}

                    <div class="note-box">
                      <div class="note-label">📝 Personal Notes</div>
                      <textarea
                        placeholder="Ghi chú kiến thức, insight, lỗi gặp phải, cách hiểu riêng của bạn..."
                        data-note-id="${taskId}"
                        oninput="saveProgress()"
                      ></textarea>
                    </div>
                  </div>
                </div>
              `;
            });

            tasksHTML += `
              <div style="margin-bottom: 16px;">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px;">
                  <div style="font-weight:700; color:#93c5fd;">
                    📌 ${task.title}
                  </div>

                  <button
                    class="task-detail-btn"
                    onclick="toggleDetail('${parentTaskId}')"
                  >
                    Chi tiết
                  </button>
                </div>

                <div class="detail-panel" id="detail-${parentTaskId}">
                  <div class="detail-title">📚 Nội dung học</div>
                  <div>${task.details || 'Chưa có nội dung chi tiết.'}</div>
                </div>

                ${subtasksHTML}
              </div>
            `;
          });

          moduleEl.innerHTML = `
            <h3 class="task-group-title">${module.title}</h3>
            ${tasksHTML}
          `;

          phaseEl.appendChild(moduleEl);
        });

        roadmapContainer.appendChild(phaseEl);
      });
    }

    function saveProgress() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      const data = {};

      checkboxes.forEach(cb => {
        data[cb.id] = cb.checked;

        const wrapper = document.getElementById(`wrapper-${cb.id}`);

        if (cb.checked) {
          wrapper.classList.add('completed');
        } else {
          wrapper.classList.remove('completed');
        }
      });

      data.notes = document.getElementById('learningNotes').value;

      const noteInputs = document.querySelectorAll('[data-note-id]');

      noteInputs.forEach(note => {
        data[`note-${note.dataset.noteId}`] = note.value;
      });

      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

      updateStats();
    }

    function loadProgress() {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));

      if (!saved) return;

      Object.keys(saved).forEach(key => {
        const element = document.getElementById(key);

        if (element && element.type === 'checkbox') {
          element.checked = saved[key];

          const wrapper = document.getElementById(`wrapper-${key}`);

          if (saved[key]) {
            wrapper.classList.add('completed');
          }
        }
      });

      const noteInputs = document.querySelectorAll('[data-note-id]');

      noteInputs.forEach(note => {
        const key = `note-${note.dataset.noteId}`;

        if (saved[key]) {
          note.value = saved[key];
        }
      });

      if (saved.notes) {
        document.getElementById('learningNotes').value = saved.notes;
      }

      updateStats();
    }

    function updateStats() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      const total = checkboxes.length;
      const completed = [...checkboxes].filter(cb => cb.checked).length;

      const percent = Math.round((completed / total) * 100);

      document.getElementById('completedTasks').innerText = completed;
      document.getElementById('totalTasks').innerText = total;
      document.getElementById('progressPercent').innerText = `${percent}%`;
      document.getElementById('mainProgressBar').style.width = `${percent}%`;

      updatePhaseProgress();
    }

    function updatePhaseProgress() {
      const phases = document.querySelectorAll('.phase');

      phases.forEach((phaseEl, phaseIndex) => {
        const checkboxes = phaseEl.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;
        const completed = [...checkboxes].filter(cb => cb.checked).length;

        const percent = Math.round((completed / total) * 100);

        document.getElementById(`phase-progress-${phaseIndex}`).innerText = `${percent}% completed`;
      });
    }

    function toggleDetail(id) {
      const panel = document.getElementById(`detail-${id}`);

      if (!panel) return;

      panel.classList.toggle('show');
    }

    function resetProgress() {
      const confirmReset = confirm('Bạn có chắc muốn reset toàn bộ progress không?');

      if (!confirmReset) return;

      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    // Quiz functions
    let currentQuiz = null;
    let quizAnswers = {};

    function startQuiz(lessonTitle) {
      currentQuiz = lessonEnhanced[lessonTitle]?.quiz;
      
      if (!currentQuiz) {
        alert('Bài này chưa có quiz. Sắp tới sẽ có! 🎓');
        return;
      }

      quizAnswers = {};
      document.getElementById('quizTitle').textContent = `📝 Quiz: ${lessonTitle}`;
      document.getElementById('quizResult').classList.remove('show');
      document.getElementById('submitBtn').style.display = 'block';

      let quizHTML = '';
      currentQuiz.forEach((q, idx) => {
        quizHTML += `
          <div class="quiz-question">
            <div class="quiz-question-text">Câu ${idx + 1}: ${q.question}</div>
            <ul class="quiz-options">
              ${q.options.map((opt, optIdx) => `
                <li class="quiz-option">
                  <input 
                    type="radio" 
                    name="q${idx}" 
                    value="${optIdx}"
                    onchange="quizAnswers['${idx}'] = '${optIdx}'"
                  />
                  ${opt}
                </li>
              `).join('')}
            </ul>
          </div>
        `;
      });

      document.getElementById('quizContent').innerHTML = quizHTML;
      document.getElementById('quizModal').classList.add('show');
    }

    function submitQuiz() {
      if (!currentQuiz) return;

      let correct = 0;
      currentQuiz.forEach((q, idx) => {
        if (quizAnswers[idx] != null && parseInt(quizAnswers[idx]) === q.correct) {
          correct++;
        }
      });

      const percentage = Math.round((correct / currentQuiz.length) * 100);
      const resultText = document.getElementById('resultText');

      if (percentage >= 80) {
        resultText.innerHTML = `✅ Tuyệt vời! Bạn được ${percentage}% (${correct}/${currentQuiz.length})`;
        resultText.className = 'quiz-result-text quiz-result-correct';
      } else if (percentage >= 50) {
        resultText.innerHTML = `⚠️ Khá! Bạn được ${percentage}% (${correct}/${currentQuiz.length})`;
        resultText.className = 'quiz-result-text';
      } else {
        resultText.innerHTML = `❌ Cần ôn lại. Bạn được ${percentage}% (${correct}/${currentQuiz.length})`;
        resultText.className = 'quiz-result-text quiz-result-incorrect';
      }

      document.getElementById('quizResult').classList.add('show');
      document.getElementById('submitBtn').style.display = 'none';
    }

    function retakeQuiz() {
      startQuiz(document.getElementById('quizTitle').textContent.replace('📝 Quiz: ', ''));
    }

    function closeQuiz() {
      document.getElementById('quizModal').classList.remove('show');
      currentQuiz = null;
      quizAnswers = {};
    }

    // Tab functions
    function switchTab(tabName, lessonTitle) {
      const tabs = document.querySelectorAll(`[data-lesson="${lessonTitle}"] .detail-tab-btn`);
      const contents = document.querySelectorAll(`[data-lesson="${lessonTitle}"] .detail-tab-content`);

      tabs.forEach(t => t.classList.remove('active'));
      contents.forEach(c => c.classList.remove('active'));

      document.querySelector(`[data-lesson="${lessonTitle}"] .detail-tab-btn[data-tab="${tabName}"]`).classList.add('active');
      document.querySelector(`[data-lesson="${lessonTitle}"] .detail-tab-content[data-tab="${tabName}"]`).classList.add('active');
    }

    document
      .getElementById('learningNotes')
      .addEventListener('input', saveProgress);

    createRoadmap();
    loadProgress();
    updateStats();
  </script>
</body>
</html>
