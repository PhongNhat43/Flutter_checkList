<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flutter Learning Academy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
    }

    .subtitle {
      color: #94a3b8;
      margin-top: 8px;
    }

    .stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .stat-card {
      flex: 1;
      min-width: 220px;
      background: #1e293b;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid #334155;
    }

    .stat-title {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
    }

    .progress-wrapper {
      width: 100%;
      height: 12px;
      background: #334155;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 16px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
      transition: width 0.3s ease;
    }

    .phase {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .phase-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .phase-title {
      font-size: 22px;
      font-weight: 700;
    }

    .phase-progress {
      color: #38bdf8;
      font-weight: 600;
    }

    .task-group {
      margin-bottom: 24px;
    }

    .task-group-title {
      font-size: 18px;
      margin-bottom: 14px;
      color: #cbd5e1;
    }

    .task {
      justify-content: space-between;
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      background: #0f172a;
      transition: 0.2s ease;
    }

    .task:hover {
      background: #111c33;
    }

    .task input {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .task label {
      flex: 1;
      cursor: pointer;
      line-height: 1.5;
    }

    .task-actions {
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }

    .task-detail-btn {
      border: 1px solid #334155;
      background: transparent;
      color: #93c5fd;
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .task-detail-btn:hover {
      background:#1e293b;
      border-color:#60a5fa;
    }

    .detail-panel {
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      margin-top: 10px;
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      display: none;
      color: #cbd5e1;
      line-height: 1.7;
      font-size: 14px;
    }

    .detail-panel.show {
      display: block;
    }

    .detail-content {
      white-space: pre-line;
      line-height: 1.9;
      color: #dbeafe;
      margin-top: 12px;
    }

    .note-box {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #334155;
    }

    .note-box textarea {
      min-height: 90px;
      font-size: 13px;
      background:#020617;
    }

    .note-label {
      font-size:13px;
      margin-bottom:10px;
      color:#93c5fd;
      font-weight:600;
    }

    .detail-title {
      color: #93c5fd;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .task.completed label {
      text-decoration: line-through;
      color: #64748b;
    }

    .notes {
      margin-top: 32px;
      background: #1e293b;
      border-radius: 20px;
      padding: 24px;
      border: 1px solid #334155;
    }

    .notes h2 {
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      color: white;
      resize: vertical;
      font-size: 14px;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }

    .reset-btn {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: #ef4444;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .reset-btn:hover {
      opacity: 0.9;
    }

    @media (max-width: 768px) {
      .title {
        font-size: 26px;
      }

      .phase-title {
        font-size: 18px;
      }

      .stat-value {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 class="title">🚀 Flutter Learning Academy</h1>
        <p class="subtitle">
          Một cuốn giáo trình học Flutter tương tác dành cho iOS Developer và người mới bắt đầu
        </p>
      </div>

      <button class="reset-btn" onclick="resetProgress()">
        Reset Progress
      </button>
                    </div>
                  </div>

                  <div class="stats">
      <div class="stat-card">
        <div class="stat-title">Tổng tiến độ</div>
        <div class="stat-value" id="progressPercent">0%</div>

        <div class="progress-wrapper">
          <div class="progress-bar" id="mainProgressBar"></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-title">Tasks hoàn thành</div>
        <div class="stat-value">
          <span id="completedTasks">0</span>/<span id="totalTasks">0</span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-title">Mục tiêu</div>
        <div class="stat-value">30 Days</div>
      </div>
    </div>

    <div id="roadmap"></div>

    <div class="notes">
      <h2>📝 Learning Notes</h2>
      <textarea
        id="learningNotes"
        placeholder="Ghi chú bug, insight, AI prompt, kiến thức học được..."
      ></textarea>
    </div>

    <div class="footer">
      Built with HTML + CSS + JavaScript + localStorage
    </div>
  </div>

    function createRoadmap() {
      roadmapData.forEach((phase, phaseIndex) => {
        const phaseEl = document.createElement('div');
        phaseEl.className = 'phase';

        phaseEl.innerHTML = `
          <div class="phase-header">
            <h2 class="phase-title">${phase.title}</h2>
            <div class="phase-progress" id="phase-progress-${phaseIndex}"></div>
          </div>
        `;

        phase.modules.forEach((module, moduleIndex) => {
          const moduleEl = document.createElement('div');
          moduleEl.className = 'task-group';

          let tasksHTML = '';

          module.tasks.forEach((task, taskIndex) => {
            const parentTaskId = `p${phaseIndex}-m${moduleIndex}-task${taskIndex}`;

            let subtasksHTML = '';

            task.subtasks.forEach((subtask, subtaskIndex) => {
              const taskId = `${parentTaskId}-sub${subtaskIndex}`;

              const detailMap = {
                'Cài Flutter SDK': `
- Download Flutter SDK từ flutter.dev

    function saveProgress() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      const data = {};

      checkboxes.forEach(cb => {
        data[cb.id] = cb.checked;

        const wrapper = document.getElementById(`wrapper-${cb.id}`);

        if (cb.checked) {
          wrapper.classList.add('completed');
        } else {
          wrapper.classList.remove('completed');
        }
      });

      data.notes = document.getElementById('learningNotes').value;

      const noteInputs = document.querySelectorAll('[data-note-id]');

      noteInputs.forEach(note => {
        data[`note-${note.dataset.noteId}`] = note.value;
      });

      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

      updateStats();
    }

    function loadProgress() {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));

      if (!saved) return;

      Object.keys(saved).forEach(key => {
        const element = document.getElementById(key);

        if (element && element.type === 'checkbox') {
          element.checked = saved[key];

          const wrapper = document.getElementById(`wrapper-${key}`);

          if (saved[key]) {
            wrapper.classList.add('completed');
          }
        }
      });

      const noteInputs = document.querySelectorAll('[data-note-id]');

      noteInputs.forEach(note => {
        const key = `note-${note.dataset.noteId}`;

        if (saved[key]) {
          note.value = saved[key];
        }
      });

      if (saved.notes) {
        document.getElementById('learningNotes').value = saved.notes;
      }

      updateStats();
    }

    function updateStats() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      const total = checkboxes.length;
      const completed = [...checkboxes].filter(cb => cb.checked).length;

      const percent = Math.round((completed / total) * 100);

      document.getElementById('completedTasks').innerText = completed;
      document.getElementById('totalTasks').innerText = total;
      document.getElementById('progressPercent').innerText = `${percent}%`;
      document.getElementById('mainProgressBar').style.width = `${percent}%`;

      updatePhaseProgress();
    }

    function updatePhaseProgress() {
      const phases = document.querySelectorAll('.phase');

      phases.forEach((phaseEl, phaseIndex) => {
        const checkboxes = phaseEl.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;
        const completed = [...checkboxes].filter(cb => cb.checked).length;

        const percent = Math.round((completed / total) * 100);

        document.getElementById(`phase-progress-${phaseIndex}`).innerText = `${percent}% completed`;
      });
    }

    function toggleDetail(id) {
      const panel = document.getElementById(`detail-${id}`);

      if (!panel) return;

      panel.classList.toggle('show');
    }

    function resetProgress() {
      const confirmReset = confirm('Bạn có chắc muốn reset toàn bộ progress không?');

      if (!confirmReset) return;

      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    document
      .getElementById('learningNotes')
      .addEventListener('input', saveProgress);

    createRoadmap();
    loadProgress();
    updateStats();
  </script>
